services:
  scraper-0:
    build: .
    environment:
      - SCRAPE_OFFSET=0
    volumes:
      - ./data:/app/data
      - ./notify/envs:/app/notify/envs:ro
    entrypoint: ["/app/notify/docker_entrypoint.sh"]
    restart: unless-stopped

  scraper-30:
